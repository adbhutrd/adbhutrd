<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </radialGradient>
    
    <!-- Accent gradients -->
    <linearGradient id="neonPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="neonBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="neonGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="neonOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="glowPurple" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowBlue" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowGreen" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="hardGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Shield clip path -->
    <clipPath id="shieldClip">
      <path d="M200 30 L340 100 L340 210 Q340 310 200 370 Q60 310 60 210 L60 100 Z"/>
    </clipPath>
  </defs>

  <!-- Dark background circle -->
  <circle cx="200" cy="200" r="195" fill="url(#bgGrad)" stroke="#30363d" stroke-width="2"/>
  
  <!-- Outer decorative rings -->
  <circle cx="200" cy="200" r="180" fill="none" stroke="#7c3aed" stroke-width="0.5" opacity="0.3"/>
  <circle cx="200" cy="200" r="155" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.2"/>

  <!-- Background orbital paths -->
  <ellipse cx="200" cy="200" rx="160" ry="60" fill="none" stroke="#7c3aed" stroke-width="0.5" opacity="0.12" transform="rotate(-30 200 200)"/>
  <ellipse cx="200" cy="200" rx="160" ry="60" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.12" transform="rotate(30 200 200)"/>
  <ellipse cx="200" cy="200" rx="160" ry="60" fill="none" stroke="#10b981" stroke-width="0.5" opacity="0.12" transform="rotate(90 200 200)"/>

  <!-- Shield outline (background) -->
  <path d="M200 40 L330 105 L330 210 Q330 305 200 360 Q70 305 70 210 L70 105 Z" 
        fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0.3"/>

  <!-- ===== SHIELD BODY ===== -->
  <g clip-path="url(#shieldClip)">
    <!-- Shield subtle fill -->
    <path d="M200 30 L340 100 L340 210 Q340 310 200 370 Q60 310 60 210 L60 100 Z" 
          fill="rgba(124,58,237,0.04)"/>
    
    <!-- Shield grid lines -->
    <line x1="200" y1="30" x2="200" y2="370" stroke="#7c3aed" stroke-width="0.3" opacity="0.15"/>
    <line x1="130" y1="70" x2="130" y2="350" stroke="#7c3aed" stroke-width="0.2" opacity="0.1"/>
    <line x1="270" y1="70" x2="270" y2="350" stroke="#7c3aed" stroke-width="0.2" opacity="0.1"/>
  </g>

  <!-- Shield outline (main) -->
  <path d="M200 40 L330 105 L330 210 Q330 305 200 360 Q70 305 70 210 L70 105 Z" 
        fill="none" stroke="url(#neonPurple)" stroke-width="2.5" filter="url(#glowPurple)"/>

  <!-- ===== ATOM / QUANTUM SYMBOL ===== -->

  <!-- Central nucleus glow -->
  <circle cx="200" cy="200" r="30" fill="rgba(124,58,237,0.08)" filter="url(#hardGlow)"/>
  <circle cx="200" cy="200" r="18" fill="rgba(124,58,237,0.15)" filter="url(#hardGlow)"/>

  <!-- Nucleus - inner core -->
  <circle cx="193" cy="194" r="6" fill="url(#neonPurple)" opacity="0.9"/>
  <circle cx="207" cy="206" r="6" fill="url(#neonBlue)" opacity="0.9"/>
  
  <!-- Nucleus center -->
  <circle cx="200" cy="200" r="4" fill="white" opacity="0.8"/>

  <!-- Electron orbit 1 -->
  <ellipse cx="200" cy="200" rx="75" ry="28" fill="none" stroke="url(#neonBlue)" stroke-width="2" 
           opacity="0.7" transform="rotate(-40 200 200)" filter="url(#glowBlue)"/>
  <!-- Electron 1 -->
  <circle cx="260" cy="156" r="5" fill="url(#neonBlue)" filter="url(#glowBlue)"/>

  <!-- Electron orbit 2 -->
  <ellipse cx="200" cy="200" rx="75" ry="28" fill="none" stroke="url(#neonGreen)" stroke-width="2" 
           opacity="0.7" transform="rotate(80 200 200)" filter="url(#glowGreen)"/>
  <!-- Electron 2 -->
  <circle cx="218" cy="274" r="5" fill="url(#neonGreen)" filter="url(#glowGreen)"/>

  <!-- Electron orbit 3 -->
  <ellipse cx="200" cy="200" rx="75" ry="28" fill="none" stroke="url(#neonOrange)" stroke-width="2" 
           opacity="0.7" transform="rotate(200 200 200)" filter="url(#glowBlue)"/>
  <!-- Electron 3 -->
  <circle cx="137" cy="153" r="5" fill="url(#neonOrange)"/>

  <!-- ===== CODE BRACKETS ===== -->
  <text x="110" y="290" font-family="'Courier New', monospace" font-size="32" 
        fill="url(#neonPurple)" opacity="0.6" filter="url(#glowPurple)">&lt;/&gt;</text>
  
  <!-- Small code dots -->
  <circle cx="290" cy="290" r="3" fill="url(#neonGreen)" opacity="0.5"/>
  <circle cx="302" cy="290" r="3" fill="url(#neonGreen)" opacity="0.5"/>
  <circle cx="314" cy="290" r="3" fill="url(#neonGreen)" opacity="0.5"/>

  <!-- ===== INITIALS "ARD" ===== -->
  <text x="200" y="335" text-anchor="middle" font-family="'Segoe UI', -apple-system, sans-serif" 
        font-size="28" font-weight="700" fill="white" opacity="0.85" letter-spacing="6">ARD</text>
  
  <!-- Underline for initials -->
  <line x1="158" y1="344" x2="242" y2="344" stroke="url(#neonPurple)" stroke-width="1.5" opacity="0.5"/>

  <!-- ===== DECORATIVE PARTICLES ===== -->
  <circle cx="85" cy="120" r="1.5" fill="#7c3aed" opacity="0.4"/>
  <circle cx="310" cy="110" r="1.5" fill="#3b82f6" opacity="0.4"/>
  <circle cx="95" cy="250" r="1" fill="#10b981" opacity="0.3"/>
  <circle cx="320" cy="240" r="1" fill="#f59e0b" opacity="0.3"/>
  <circle cx="150" cy="100" r="1" fill="#a855f7" opacity="0.3"/>
  <circle cx="260" cy="95" r="1" fill="#06b6d4" opacity="0.3"/>
</svg>
